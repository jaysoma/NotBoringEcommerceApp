<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NOT AMAZON :: terminal storefront</title>
<style>
  :root{
    --bg:#060a06; --grn:#33ff66; --grn-dim:#1c7a39;
    --amb:#ffb000; --amb-dim:#8a5f00; --red:#ff4136;
    --scan:rgba(0,0,0,.30);
  }
  *{box-sizing:border-box;}
  html,body{height:100%;margin:0;}
  body{
    background:var(--bg); color:var(--grn);
    font-family:"Courier New",Consolas,"DejaVu Sans Mono",monospace;
    font-size:15px; line-height:1.5; letter-spacing:.02em;
    text-shadow:0 0 4px currentColor; overflow-x:hidden;
    display:flex; flex-direction:row; align-items:flex-start; gap:0;
  }
  .crt::before{content:"";position:fixed;inset:0;z-index:9;pointer-events:none;
    background:repeating-linear-gradient(to bottom,transparent 0 2px,var(--scan) 2px 3px);}
  .crt::after{content:"";position:fixed;inset:0;z-index:9;pointer-events:none;
    background:radial-gradient(ellipse at center,transparent 58%,rgba(0,0,0,.6) 100%);}
  @keyframes flicker{0%,100%{opacity:1}92%{opacity:1}93%{opacity:.85}94%{opacity:1}}
  .term{flex:1;padding:26px 22px 90px;animation:flicker 7s infinite;min-width:0;}
  .term-raw{
    width:300px; flex-shrink:0;
    border:1px solid var(--amb-dim);
    border-radius:8px;
    margin:18px 0 18px 18px;
    padding:16px 14px 32px;
    color:var(--amb); text-shadow:0 0 4px var(--amb);
    box-shadow:0 0 12px rgba(255,176,0,.15), inset 0 0 24px rgba(0,0,0,.4);
    overflow-y:auto; font-size:12px; line-height:1.4;
    animation:flicker 7s infinite 0.3s;
    position:sticky; top:18px; max-height:calc(100vh - 36px);
    display:flex; flex-direction:column; gap:0;
  }
  .raw-hdr{
    color:var(--amb-dim); font-size:11px; border-bottom:1px solid var(--amb-dim);
    padding-bottom:6px; margin-bottom:8px; letter-spacing:.05em; flex-shrink:0;
  }
  .raw-log{
    font-size:11px; color:var(--amb-dim); flex-shrink:0;
    border-bottom:1px solid var(--amb-dim); padding-bottom:8px; margin-bottom:8px;
  }
  .raw-log .rw-req{color:var(--amb);}
  .raw-log .rw-ok{color:var(--grn);}
  .raw-log .rw-err{color:var(--red);}
  .raw-log .rw-gen{color:var(--amb-dim);}
  .raw-log .spin{display:inline-block;}
  #rawOut{margin:0;white-space:pre-wrap;word-break:break-all;font:inherit;color:var(--amb);flex:1;}
  @media (prefers-reduced-motion:reduce){.term{animation:none}.term-raw{animation:none}.cursor{animation:none}}
  pre{margin:0;white-space:pre-wrap;word-break:break-word;font:inherit;}
  .ascii{color:var(--grn);font-size:clamp(5px,1.5vw,11px);line-height:1.05;
    white-space:pre;overflow:hidden;margin:6px 0 2px;}
  .tag{color:var(--grn-dim);margin:0 0 20px;font-size:13px;}
  .tag b{color:var(--amb);}
  .line{margin:2px 0;}
  .sys{color:var(--grn-dim);}
  .ok{color:var(--grn);}
  .err{color:var(--red);}
  .menu{margin:10px 0 4px;}
  .menu .item{padding:4px 8px;cursor:pointer;display:inline-block;
    border:1px solid transparent;}
  .menu .item:hover,.menu .item:focus{background:var(--grn);color:var(--bg);
    text-shadow:none;outline:none;}
  .menu .item .k{color:var(--amb);margin-right:8px;}
  .menu .item:hover .k,.menu .item:focus .k{color:var(--bg);}
  .card{border:1px solid var(--grn-dim);padding:10px 12px;margin:8px 0;overflow:hidden;}
  .card .name{color:var(--grn);font-weight:bold;}
  .card .price{color:var(--amb);float:right;}
  .card .desc{color:var(--grn-dim);font-size:13px;margin-top:4px;}
  .prompt{margin-top:18px;}
  .ps1{color:var(--amb);}
  .cursor{display:inline-block;width:9px;height:1.05em;background:var(--grn);
    vertical-align:text-bottom;margin-left:3px;animation:blink 1s steps(1) infinite;}
  @keyframes blink{50%{opacity:0}}
  ::-webkit-scrollbar{width:8px;}
  ::-webkit-scrollbar-thumb{background:var(--amb-dim);}
  ::-webkit-scrollbar-track{background:var(--bg);}
</style>
</head>
<body class="crt">
<div class="term-raw" id="rawPanel">
  <div class="raw-hdr" id="rawHdr">DOS CONSOLE</div>
  <div class="raw-log" id="rawLog"></div>
  <pre id="rawOut"></pre>
</div>
<div class="term" id="term">
  <div id="stream"></div>
  <div class="prompt"><span class="ps1">C:\STORE&gt;</span> <span id="ps"></span><span class="cursor"></span></div>
</div>
<script>
const API = "";
const reduce = matchMedia("(prefers-reduced-motion:reduce)").matches;
const sleep = ms => new Promise(r=>setTimeout(r, reduce?0:ms));
const stream = document.getElementById("stream");
const ps = document.getElementById("ps");
const rawOut = document.getElementById("rawOut");
const rawPanel = document.getElementById("rawPanel");
const rawLog = document.getElementById("rawLog");
const rawHdr = document.getElementById("rawHdr");

function el(cls, html){const d=document.createElement("div");d.className=cls;d.innerHTML=html;stream.appendChild(d);scroll();return d;}
function scroll(){window.scrollTo(0,document.body.scrollHeight);}
function esc(s){return String(s).replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));}

function rawLine(cls, html){
  const d=document.createElement("div");d.className=cls;d.innerHTML=html;
  rawLog.appendChild(d); rawPanel.scrollTop=rawPanel.scrollHeight; return d;
}

async function typeInto(node, text, speed=10){
  for(const ch of text){ node.innerHTML += esc(ch); if(!reduce) await sleep(speed); }
  scroll();
}
async function setPrompt(text){ ps.textContent=""; for(const c of text){ ps.textContent+=c; await sleep(20);} }

const boot = [
  "NOTBIOS v8.010  (C) 2026 NotAmazon Systems",
  "Memory ............ 16384K OK",
  "Inventory daemon .. <span class='ok'>ONLINE</span>",
  "Qwen 2.5 (7B) ..... <span class='ok'>LOADED</span>",
  "",
];
const ART =
`███╗   ██╗ ██████╗ ████████╗     █████╗ ███╗   ███╗ █████╗ ███████╗ ██████╗ ███╗   ██╗
████╗  ██║██╔═══██╗╚══██╔══╝    ██╔══██╗████╗ ████║██╔══██╗╚══███╔╝██╔═══██╗████╗  ██║
██╔██╗ ██║██║   ██║   ██║       ███████║██╔████╔██║███████║  ███╔╝ ██║   ██║██╔██╗ ██║
██║╚██╗██║██║   ██║   ██║       ██╔══██║██║╚██╔╝██║██╔══██║ ███╔╝  ██║   ██║██║╚██╗██║
██║ ╚████║╚██████╔╝   ██║       ██║  ██║██║ ╚═╝ ██║██║  ██║███████╗╚██████╔╝██║ ╚████║
╚═╝  ╚═══╝ ╚═════╝    ╚═╝       ╚═╝  ╚═╝╚═╝     ╚═╝╚═╝  ╚═╝╚══════╝ ╚═════╝ ╚═╝  ╚═══╝`;

async function start(){
  for(const b of boot){ el("line sys", b); await sleep(160); }
  await sleep(300);
  const a=document.createElement("pre");a.className="ascii";a.textContent=ART;stream.appendChild(a);
  el("tag","an honest store &mdash; every click prints the wire and the AI builds the shelves live");
  await sleep(400);
  loadCategories();
}

function startWire(path){
  rawLog.innerHTML = "";
  rawOut.textContent = "";
  rawHdr.textContent = `RAW TOKEN STREAM > ${path}`;
  rawLine("rw-req", `&gt; GET ${esc(path)} HTTP/1.1`);
  rawLine("rw-req", `&gt; Host: ${location.host||"localhost:8010"}`);
  const frames=["▙","▛","▜","▟"]; let fi=0;
  const t0=performance.now();
  const genEl = rawLine("rw-gen",`<span class='spin'>&#9624;</span> waiting &mdash; <span class='ms'>0</span>ms`);
  const msEl = genEl.querySelector(".ms");
  const tick=setInterval(()=>{ msEl.textContent=Math.round(performance.now()-t0);
    if(!reduce) genEl.querySelector(".spin").textContent=frames[fi=(fi+1)%4]; },90);
  function finish(ok, ms){
    clearInterval(tick); genEl.remove();
    rawLine(ok?"rw-ok":"rw-err", `&lt; ${ok?"200 OK":"ERROR"} &middot; ${ms}ms`);
  }
  return {t0, tick, finish};
}

async function loadCategories(){
  el("line sys","fetching catalog ...");
  const {t0, finish} = startWire("/categories");

  return new Promise(resolve=>{
    const es = new EventSource(API+"/categories");
    es.onmessage = e=>{
      let msg;
      try{ msg=JSON.parse(e.data); }catch{ return; }
      if(msg.token !== undefined){
        rawOut.textContent += msg.token;
        rawPanel.scrollTop = rawPanel.scrollHeight;
      }
      if(msg.categories){
        es.close();
        finish(true, (performance.now()-t0).toFixed(0));
        if(!Array.isArray(msg.categories)||!msg.categories.length){
          el("line err","catalog unavailable or wrong shape."); resolve(); return;
        }
        const menu = el("menu","");
        el("line sys","pick a department:");
        msg.categories.forEach((cat,i)=>{
          const item=document.createElement("span");
          item.className="item";item.tabIndex=0;
          item.innerHTML=`<span class='k'>[${i+1}]</span>${esc(cat)}`;
          const go=()=>selectCategory(cat);
          item.onclick=go;
          item.onkeydown=ev=>{if(ev.key==="Enter")go();};
          menu.appendChild(item);
        });
        document.onkeydown=ev=>{const n=+ev.key;
          if(n>=1&&n<=msg.categories.length) selectCategory(msg.categories[n-1]);};
        setPrompt("type a number or click a department_");
        resolve();
      }
    };
    es.onerror = ()=>{
      es.close();
      finish(false, (performance.now()-t0).toFixed(0));
      el("line err","  is the backend up on :8010?");
      resolve();
    };
  });
}

function findProducts(obj){
  if(Array.isArray(obj) && obj.length) return obj;
  if(obj && typeof obj==="object"){
    for(const k of Object.keys(obj)){
      const hit=findProducts(obj[k]);
      if(hit) return hit;
    }
  }
  return null;
}
function inferFields(it){
  if(typeof it === "string") return {name:it, price:null, desc:null};
  const vals = Object.entries(it).filter(([,v])=>typeof v==="string" && v.trim());
  const priceEntry = vals.find(([k,v])=>/price|cost|amount/i.test(k) || /^\$[\d.,]+/.test(v));
  const price = priceEntry ? priceEntry[1] : null;
  const rest = vals.filter(e=>e!==priceEntry && !/category|type|tag/i.test(e[0]));
  // prefer explicit name key, else shortest non-desc string
  const nameEntry = rest.find(([k])=>/^(name|title|product|item)$/i.test(k))
    ?? [...rest].sort((a,b)=>a[1].length-b[1].length)[0];
  const name = nameEntry?.[1] ?? "Unnamed";
  const descEntry = rest.filter(e=>e!==nameEntry).sort((a,b)=>b[1].length-a[1].length)[0];
  const desc = descEntry?.[1] ?? null;
  return {name, price, desc};
}

async function selectCategory(cat){
  document.onkeydown=null;
  el("line ok","&gt; "+esc(cat));
  await setPrompt(`browsing "${cat}"_`);
  const path = `/products/${encodeURIComponent(cat.toLowerCase())}`;
  const {t0, finish} = startWire(path);

  return new Promise(resolve=>{
    const es = new EventSource(API+path);
    es.onmessage = async e=>{
      let msg;
      try{ msg=JSON.parse(e.data); }catch{ return; }
      if(msg.token !== undefined){
        rawOut.textContent += msg.token;
        rawPanel.scrollTop = rawPanel.scrollHeight;
      }
      if(msg.products){
        es.close();
        finish(true, (performance.now()-t0).toFixed(0));
        const items = msg.products || findProducts(msg);
        if(!items || !items.length){
          el("line sys","no products returned."); resolve(); return;
        }
        for(const it of items){
          const {name, price, desc} = inferFields(it);
          const card = el("card",
            (price!=null ? `<span class='price'>${esc(price)}</span>` : "")+
            `<span class='name'></span>`+
            (desc?`<div class='desc'></div>`:""));
          await typeInto(card.querySelector(".name"), String(name), 12);
          if(desc) await typeInto(card.querySelector(".desc"), String(desc), 6);
          await sleep(120);
        }
        el("line sys",`${items.length} item(s) generated. press a number for another department.`);
        loadAgainHint();
        resolve();
      }
    };
    es.onerror = ()=>{
      es.close();
      finish(false, (performance.now()-t0).toFixed(0));
      el("line err","  is the backend up on :8010?");
      resolve();
    };
  });
}

function loadAgainHint(){ setPrompt("select another department above, or press R to restart_");
  document.onkeydown=e=>{ if(e.key==="r"||e.key==="R") location.reload(); }; }
start();
</script>
</body>
</html>
