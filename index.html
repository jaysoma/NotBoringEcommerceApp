<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NOT AMAZON :: terminal storefront</title>
<style>
  :root{
    --bg:#060a06; --grn:#33ff66; --grn-dim:#1c7a39;
    --amb:#ffb000; --amb-dim:#8a5f00; --red:#ff4136;
    --scan:rgba(0,0,0,.30);
  }
  *{box-sizing:border-box;}
  html,body{height:100%;margin:0;}
  body{
    background:var(--bg); color:var(--grn);
    font-family:"Courier New",Consolas,"DejaVu Sans Mono",monospace;
    font-size:15px; line-height:1.5; letter-spacing:.02em;
    text-shadow:0 0 4px currentColor; overflow-x:hidden;
  }
  .crt::before{content:"";position:fixed;inset:0;z-index:9;pointer-events:none;
    background:repeating-linear-gradient(to bottom,transparent 0 2px,var(--scan) 2px 3px);}
  .crt::after{content:"";position:fixed;inset:0;z-index:9;pointer-events:none;
    background:radial-gradient(ellipse at center,transparent 58%,rgba(0,0,0,.6) 100%);}
  @keyframes flicker{0%,100%{opacity:1}92%{opacity:1}93%{opacity:.85}94%{opacity:1}}
  .term{max-width:880px;margin:0 auto;padding:26px 22px 90px;animation:flicker 7s infinite;}
  @media (prefers-reduced-motion:reduce){.term{animation:none}.cursor{animation:none}}
  pre{margin:0;white-space:pre-wrap;word-break:break-word;font:inherit;}
  .ascii{color:var(--grn);font-size:clamp(5px,1.5vw,11px);line-height:1.05;
    white-space:pre;overflow:hidden;margin:6px 0 2px;}
  .tag{color:var(--grn-dim);margin:0 0 20px;font-size:13px;}
  .tag b{color:var(--amb);}
  .line{margin:2px 0;}
  .sys{color:var(--grn-dim);}
  .ok{color:var(--grn);}
  .err{color:var(--red);}
  .wire{color:var(--amb);font-size:13px;margin:6px 0;
    border-left:2px solid var(--amb-dim);padding-left:12px;}
  .wire .dim{color:var(--amb-dim);}
  .wire .stat-ok{color:var(--grn);} .wire .stat-err{color:var(--red);}
  .menu{margin:10px 0 4px;}
  .menu .item{padding:4px 8px;cursor:pointer;display:inline-block;
    border:1px solid transparent;}
  .menu .item:hover,.menu .item:focus{background:var(--grn);color:var(--bg);
    text-shadow:none;outline:none;}
  .menu .item .k{color:var(--amb);margin-right:8px;}
  .menu .item:hover .k,.menu .item:focus .k{color:var(--bg);}
  .gen{color:var(--amb);margin:8px 0;}
  .gen .spin{display:inline-block;}
  .card{border:1px solid var(--grn-dim);padding:10px 12px;margin:8px 0;overflow:hidden;}
  .card .name{color:var(--grn);font-weight:bold;}
  .card .price{color:var(--amb);float:right;}
  .card .desc{color:var(--grn-dim);font-size:13px;margin-top:4px;}
  .prompt{margin-top:18px;}
  .ps1{color:var(--amb);}
  .cursor{display:inline-block;width:9px;height:1.05em;background:var(--grn);
    vertical-align:text-bottom;margin-left:3px;animation:blink 1s steps(1) infinite;}
  @keyframes blink{50%{opacity:0}}
  ::-webkit-scrollbar{width:8px;}
  ::-webkit-scrollbar-thumb{background:var(--amb-dim);}
  ::-webkit-scrollbar-track{background:var(--bg);}
</style>
</head>
<body class="crt">
<div class="term" id="term">
  <div id="stream"></div>
  <div class="prompt"><span class="ps1">C:\STORE&gt;</span> <span id="ps"></span><span class="cursor"></span></div>
</div>
<script>
const API = "";
const reduce = matchMedia("(prefers-reduced-motion:reduce)").matches;
const sleep = ms => new Promise(r=>setTimeout(r, reduce?0:ms));
const stream = document.getElementById("stream");
const ps = document.getElementById("ps");
function el(cls, html){const d=document.createElement("div");d.className=cls;d.innerHTML=html;stream.appendChild(d);scroll();return d;}
function scroll(){window.scrollTo(0,document.body.scrollHeight);}
function esc(s){return String(s).replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));}
async function typeInto(node, text, speed=10){
  for(const ch of text){ node.innerHTML += esc(ch); if(!reduce) await sleep(speed); }
  scroll();
}
async function setPrompt(text){ ps.textContent=""; for(const c of text){ ps.textContent+=c; await sleep(20);} }
const boot = [
  "NOTBIOS v8.010  (C) 2026 NotAmazon Systems",
  "Memory ............ 16384K OK",
  "Inventory daemon .. <span class='ok'>ONLINE</span>",
  "Qwen 2.5 (3B) ..... <span class='ok'>LOADED</span>",
  "",
];
const ART =
`███╗   ██╗ ██████╗ ████████╗     █████╗ ███╗   ███╗ █████╗ ███████╗ ██████╗ ███╗   ██╗
████╗  ██║██╔═══██╗╚══██╔══╝    ██╔══██╗████╗ ████║██╔══██╗╚══███╔╝██╔═══██╗████╗  ██║
██╔██╗ ██║██║   ██║   ██║       ███████║██╔████╔██║███████║  ███╔╝ ██║   ██║██╔██╗ ██║
██║╚██╗██║██║   ██║   ██║       ██╔══██║██║╚██╔╝██║██╔══██║ ███╔╝  ██║   ██║██║╚██╗██║
██║ ╚████║╚██████╔╝   ██║       ██║  ██║██║ ╚═╝ ██║██║  ██║███████╗╚██████╔╝██║ ╚████║
╚═╝  ╚═══╝ ╚═════╝    ╚═╝       ╚═╝  ╚═╝╚═╝     ╚═╝╚═╝  ╚═╝╚══════╝ ╚═════╝ ╚═╝  ╚═══╝`;
async function start(){
  for(const b of boot){ el("line sys", b); await sleep(160); }
  await sleep(300);
  const a=document.createElement("pre");a.className="ascii";a.textContent=ART;stream.appendChild(a);
  el("tag","an honest store &mdash; every click prints the wire and the AI builds the shelves live");
  await sleep(400);
  loadCategories();
}
async function wireFetch(method, path){
  const w = el("wire",
    `<span>&gt; ${method} ${esc(path)} HTTP/1.1</span><br>`+
    `<span class='dim'>&gt; Host: ${location.host||"localhost:8010"}</span>`);
  const gen = el("gen", `<span class='spin'>&#9624;</span> AI is stocking the shelves &mdash; <span class='ms'>0</span>ms`);
  const msEl = gen.querySelector(".ms");
  const frames=["\u2599","\u259B","\u259C","\u259F"]; let fi=0;
  const t0=performance.now();
  const tick=setInterval(()=>{ msEl.textContent=Math.round(performance.now()-t0);
    if(!reduce) gen.querySelector(".spin").textContent=frames[fi=(fi+1)%4]; },90);
  try{
    const res = await fetch(API+path,{method,headers:{Accept:"application/json"}});
    clearInterval(tick); gen.remove();
    const ms=(performance.now()-t0).toFixed(0);
    const cls=res.ok?"stat-ok":"stat-err";
    w.innerHTML += `<br><span class='${cls}'>&lt; ${res.status} ${res.statusText} &middot; ${ms}ms</span>`;
    const data = await res.json();
    return data;
  }catch(err){
    clearInterval(tick); gen.remove();
    w.innerHTML += `<br><span class='stat-err'>&lt; CONNECTION FAILED &mdash; ${esc(err.message)}</span>`;
    el("line err","  is the backend up on :8010?");
    return null;
  }
}
async function loadCategories(){
  el("line sys","fetching catalog ...");
  const data = await wireFetch("GET","/categories");
  if(!data || !Array.isArray(data.categories)){
    el("line err","catalog unavailable or wrong shape."); return;
  }
  const menu = el("menu","");
  el("line sys","pick a department:");
  data.categories.forEach((cat,i)=>{
    const item=document.createElement("span");
    item.className="item";item.tabIndex=0;
    item.innerHTML=`<span class='k'>[${i+1}]</span>${esc(cat)}`;
    const go=()=>selectCategory(cat);
    item.onclick=go;
    item.onkeydown=e=>{if(e.key==="Enter")go();};
    menu.appendChild(item);
  });
  document.onkeydown=e=>{const n=+e.key;
    if(n>=1&&n<=data.categories.length) selectCategory(data.categories[n-1]);};
  setPrompt("type a number or click a department_");
}
function findProducts(obj){
  if(Array.isArray(obj) && obj.length) return obj;
  if(obj && typeof obj==="object"){
    for(const k of Object.keys(obj)){
      const hit=findProducts(obj[k]);
      if(hit) return hit;
    }
  }
  return null;
}
const pick=(o,keys)=>{for(const k of keys){ for(const ok of Object.keys(o)){ if(ok.toLowerCase()===k){return o[ok];}}} return null;};
async function selectCategory(cat){
  document.onkeydown=null;
  el("line ok","&gt; "+esc(cat));
  await setPrompt(`browsing "${cat}"_`);
  const data = await wireFetch("GET",`/products/${encodeURIComponent(cat.toLowerCase())}`);
  if(!data){ return; }
  const items = data.products || findProducts(data);
  if(!items || !items.length){
    el("line sys","raw response:");
    el("wire","<pre>"+esc(JSON.stringify(data,null,2))+"</pre>");
    return;
  }
  for(const it of items){
    const name = (typeof it === "string") ? it : pick(it,["name","title","product","id"]) ?? "Unnamed";
    const price = (typeof it === "string") ? null : pick(it,["price","cost","amount"]);
    const desc = (typeof it === "string") ? null : pick(it,["description","desc","blurb","details"]);
    const card = el("card",
      (price!=null?`<span class='price'>${esc(price)}</span>`:"")+
      `<span class='name'></span>`+
      (desc?`<div class='desc'></div>`:""));
    await typeInto(card.querySelector(".name"), String(name), 12);
    if(desc) await typeInto(card.querySelector(".desc"), String(desc), 6);
    await sleep(120);
  }
  el("line sys",`${items.length} item(s) generated. press a number for another department.`);
  loadAgainHint();
}
function loadAgainHint(){ setPrompt("select another department above, or press R to restart_");
  document.onkeydown=e=>{ if(e.key==="r"||e.key==="R") location.reload(); }; }
start();
</script>
</body>
</html>
